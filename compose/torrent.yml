
# Torrent module — adds Deluge.
# If also using VPN (compose/vpn.yml), load that AFTER this file.
# The VPN overlay will move Deluge onto the Gluetun network.
#
# Usage (no VPN):  docker compose -f docker-compose.yml -f compose/torrent.yml up -d
# Usage (with VPN): docker compose -f docker-compose.yml -f compose/torrent.yml -f compose/vpn.yml up -d

services:

  deluge:
    image: lscr.io/linuxserver/deluge:2.2.0-ls370
    container_name: deluge
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - DELUGE_LOGLEVEL=error
    volumes:
      - ./config/deluge:/config
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - "8112:8112"   # WebUI
      - "58846:58846" # Daemon (used by Radarr/Sonarr)
    networks:
      - media-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
